name: husband
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  hijri: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Cormorant Garamond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Italic.ttf
        - asset: assets/fonts/CormorantGaramond.ttf
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans.ttf
        - asset: assets/fonts/DMSans-Italic.ttf